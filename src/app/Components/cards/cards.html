<div class="cards-container">
  <div class="container">
    <div class="cards-header">
      <h2>Products</h2>
      <p>Discover our amazing collection of premium items</p>
    </div>

    <div class="row g-4">
      @for (product of products; track product.name) {
        <div class="col-lg-3 col-md-6">
          <div class="card h-100">
            <div class="card-img-wrapper">
              <img [src]="product.image" class="card-img-top" [alt]="product.name">
              <div class="card-img-overlay">
                <span class="card-img-overlay-text">View Info</span>
              </div>
            </div>
            <div class="card-body">
              <h5 class="card-title">{{ product.name }}</h5>
              <p class="card-text">High-quality item with exceptional features and durability.</p>
              <p class="product-price">${{ product.price }}</p>
              <p class="pieces-info" [class.out-of-stock]="product.pieces === 0">
                📦 {{ product.pieces }} in stock
              </p>
              <div class="card-footer">
                <button 
                  class="btn btn-primary" 
                  [disabled]="product.pieces===0"
                  [class.btn-out-of-stock]="product.pieces===0"
                  (click)="addToCart(product)">
                  Add to Cart
                </button>
              </div>
            </div>
          </div>
        </div>
      } @empty {
        <div class="col-12">
          <p class="text-center">No products available.</p>
        </div>
      }

    </div>
  </div>
</div>
